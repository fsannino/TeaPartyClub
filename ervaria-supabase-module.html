<!-- 
  ============================================================
  ERVARIA — Módulo de Integração Supabase
  ============================================================
  COMO USAR:
  1. Cole este bloco ANTES do </body> do seu tpc-app-v2.html
  2. Adicione o botão de login no header do app
  3. Substitua as chamadas localStorage por ervaria.sync.*
  ============================================================
-->

<!-- Supabase JS SDK v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
// ============================================================
// ERVARIA SYNC MODULE
// ============================================================
const ERVARIA_CONFIG = {
  supabaseUrl: 'https://lwzrzztzpklzbmxbqcrx.supabase.co',
  supabaseKey: 'sb_publishable_bZGiaIhD7KqZ5QffyrHwRA_g7fmRT25',
  redirectUrl: window.location.origin + window.location.pathname
};

const ervaria = {
  client: null,
  user: null,
  isOnline: false,

  // ── INIT ──────────────────────────────────────────────────
  async init() {
    try {
      this.client = window.supabase.createClient(
        ERVARIA_CONFIG.supabaseUrl,
        ERVARIA_CONFIG.supabaseKey
      );

      // Escutar mudanças de auth
      this.client.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session?.user) {
          this.user = session.user;
          this.isOnline = true;
          this.onLogin();
        } else if (event === 'SIGNED_OUT') {
          this.user = null;
          this.isOnline = false;
          this.onLogout();
        }
      });

      // Verificar sessão existente
      const { data: { session } } = await this.client.auth.getSession();
      if (session?.user) {
        this.user = session.user;
        this.isOnline = true;
        this.onLogin();
      } else {
        this.updateAuthUI(false);
      }
    } catch (e) {
      console.warn('Supabase init failed, running offline:', e);
      this.updateAuthUI(false);
    }
  },

  // ── AUTH ───────────────────────────────────────────────────
  async loginEmail(email, password) {
    const { data, error } = await this.client.auth.signInWithPassword({ email, password });
    if (error) throw error;
    return data;
  },

  async signupEmail(email, password, displayName) {
    const { data, error } = await this.client.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: displayName || email.split('@')[0] }
      }
    });
    if (error) throw error;
    return data;
  },

  async loginGoogle() {
    const { data, error } = await this.client.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: ERVARIA_CONFIG.redirectUrl }
    });
    if (error) throw error;
    return data;
  },

  async loginApple() {
    const { data, error } = await this.client.auth.signInWithOAuth({
      provider: 'apple',
      options: { redirectTo: ERVARIA_CONFIG.redirectUrl }
    });
    if (error) throw error;
    return data;
  },

  async logout() {
    await this.client.auth.signOut();
  },

  async resetPassword(email) {
    const { error } = await this.client.auth.resetPasswordForEmail(email, {
      redirectTo: ERVARIA_CONFIG.redirectUrl
    });
    if (error) throw error;
  },

  // ── CALLBACKS (override no app principal) ─────────────────
  onLogin() {
    this.updateAuthUI(true);
    this.syncFromCloud();  // Puxa dados da nuvem
    console.log('Ervaria: logged in as', this.user.email);
  },

  onLogout() {
    this.updateAuthUI(false);
    console.log('Ervaria: logged out');
  },

  // ── SYNC: FAVORITOS ───────────────────────────────────────
  sync: {
    // Favoritos
    async getFavorites() {
      if (!ervaria.isOnline) return JSON.parse(localStorage.getItem('ervaria_favorites') || '[]');
      const { data, error } = await ervaria.client
        .from('user_favorites')
        .select('tea_id')
        .eq('user_id', ervaria.user.id);
      if (error) { console.error(error); return JSON.parse(localStorage.getItem('ervaria_favorites') || '[]'); }
      const ids = data.map(r => r.tea_id);
      localStorage.setItem('ervaria_favorites', JSON.stringify(ids));
      return ids;
    },

    async toggleFavorite(teaId) {
      const favs = await this.getFavorites();
      const isFav = favs.includes(teaId);
      if (isFav) {
        favs.splice(favs.indexOf(teaId), 1);
        if (ervaria.isOnline) {
          await ervaria.client.from('user_favorites')
            .delete()
            .eq('user_id', ervaria.user.id)
            .eq('tea_id', teaId);
        }
      } else {
        favs.push(teaId);
        if (ervaria.isOnline) {
          await ervaria.client.from('user_favorites')
            .insert({ user_id: ervaria.user.id, tea_id: teaId });
        }
      }
      localStorage.setItem('ervaria_favorites', JSON.stringify(favs));
      return !isFav; // retorna novo estado
    },

    // Inventário ("tenho em casa")
    async getInventory() {
      if (!ervaria.isOnline) return JSON.parse(localStorage.getItem('ervaria_inventory') || '[]');
      const { data, error } = await ervaria.client
        .from('user_inventory')
        .select('tea_id')
        .eq('user_id', ervaria.user.id);
      if (error) { console.error(error); return JSON.parse(localStorage.getItem('ervaria_inventory') || '[]'); }
      const ids = data.map(r => r.tea_id);
      localStorage.setItem('ervaria_inventory', JSON.stringify(ids));
      return ids;
    },

    async toggleInventory(teaId) {
      const inv = await this.getInventory();
      const has = inv.includes(teaId);
      if (has) {
        inv.splice(inv.indexOf(teaId), 1);
        if (ervaria.isOnline) {
          await ervaria.client.from('user_inventory')
            .delete()
            .eq('user_id', ervaria.user.id)
            .eq('tea_id', teaId);
        }
      } else {
        inv.push(teaId);
        if (ervaria.isOnline) {
          await ervaria.client.from('user_inventory')
            .insert({ user_id: ervaria.user.id, tea_id: teaId });
        }
      }
      localStorage.setItem('ervaria_inventory', JSON.stringify(inv));
      return !has;
    },

    // Preferências do Onboarding
    async getPreferences() {
      if (!ervaria.isOnline) return JSON.parse(localStorage.getItem('ervaria_preferences') || 'null');
      const { data, error } = await ervaria.client
        .from('user_preferences')
        .select('*')
        .eq('user_id', ervaria.user.id)
        .single();
      if (error || !data) return JSON.parse(localStorage.getItem('ervaria_preferences') || 'null');
      const prefs = { caffeine: data.caffeine_pref, moment: data.moment_pref, flavor: data.flavor_pref };
      localStorage.setItem('ervaria_preferences', JSON.stringify(prefs));
      return prefs;
    },

    async savePreferences(caffeine, moment, flavor) {
      const prefs = { caffeine, moment, flavor };
      localStorage.setItem('ervaria_preferences', JSON.stringify(prefs));
      if (ervaria.isOnline) {
        await ervaria.client.from('user_preferences').upsert({
          user_id: ervaria.user.id,
          caffeine_pref: caffeine,
          moment_pref: moment,
          flavor_pref: flavor
        }, { onConflict: 'user_id' });

        // Marcar onboarding como completo
        await ervaria.client.from('user_profiles')
          .update({ onboarding_completed: true })
          .eq('id', ervaria.user.id);
      }
    },

    // Histórico da Roda dos Chás
    async addWheelEntry(feeling, teaId, teaName) {
      if (ervaria.isOnline) {
        await ervaria.client.from('tea_wheel_history').insert({
          user_id: ervaria.user.id,
          feeling,
          tea_id: teaId,
          tea_name: teaName
        });
      }
      // Salvar localmente também
      const history = JSON.parse(localStorage.getItem('ervaria_wheel_history') || '[]');
      history.unshift({ feeling, teaId, teaName, date: new Date().toISOString() });
      if (history.length > 50) history.length = 50; // Limitar a 50
      localStorage.setItem('ervaria_wheel_history', JSON.stringify(history));
    },

    async getWheelHistory() {
      if (!ervaria.isOnline) return JSON.parse(localStorage.getItem('ervaria_wheel_history') || '[]');
      const { data, error } = await ervaria.client
        .from('tea_wheel_history')
        .select('*')
        .eq('user_id', ervaria.user.id)
        .order('created_at', { ascending: false })
        .limit(50);
      if (error) return JSON.parse(localStorage.getItem('ervaria_wheel_history') || '[]');
      return data.map(r => ({ feeling: r.feeling, teaId: r.tea_id, teaName: r.tea_name, date: r.created_at }));
    },

    // Diário de Degustação
    async addJournalEntry(teaId, teaName, rating, aromaNotes, flavorNotes, context) {
      const entry = { teaId, teaName, rating, aromaNotes, flavorNotes, context, date: new Date().toISOString() };
      if (ervaria.isOnline) {
        await ervaria.client.from('tasting_journal').insert({
          user_id: ervaria.user.id,
          tea_id: teaId,
          tea_name: teaName,
          rating,
          aroma_notes: aromaNotes,
          flavor_notes: flavorNotes,
          context
        });
      }
      const journal = JSON.parse(localStorage.getItem('ervaria_journal') || '[]');
      journal.unshift(entry);
      localStorage.setItem('ervaria_journal', JSON.stringify(journal));
      return entry;
    },

    async getJournal() {
      if (!ervaria.isOnline) return JSON.parse(localStorage.getItem('ervaria_journal') || '[]');
      const { data, error } = await ervaria.client
        .from('tasting_journal')
        .select('*')
        .eq('user_id', ervaria.user.id)
        .order('created_at', { ascending: false });
      if (error) return JSON.parse(localStorage.getItem('ervaria_journal') || '[]');
      return data;
    }
  },

  // ── SYNC COMPLETO (login → puxar tudo da nuvem) ──────────
  async syncFromCloud() {
    if (!this.isOnline) return;
    try {
      // Puxar tudo em paralelo
      const [favs, inv, prefs, history] = await Promise.all([
        this.sync.getFavorites(),
        this.sync.getInventory(),
        this.sync.getPreferences(),
        this.sync.getWheelHistory()
      ]);
      console.log('Ervaria: synced from cloud', { favs: favs.length, inv: inv.length });

      // Disparar evento para o app atualizar a UI
      window.dispatchEvent(new CustomEvent('ervaria-synced', {
        detail: { favorites: favs, inventory: inv, preferences: prefs, history }
      }));
    } catch (e) {
      console.error('Ervaria: sync error', e);
    }
  },

  // ── MERGE LOCAL → NUVEM (primeiro login) ──────────────────
  async mergeLocalToCloud() {
    if (!this.isOnline) return;

    // Favoritos locais que ainda não estão na nuvem
    const localFavs = JSON.parse(localStorage.getItem('ervaria_favorites') || '[]');
    const { data: cloudFavs } = await this.client.from('user_favorites')
      .select('tea_id').eq('user_id', this.user.id);
    const cloudFavIds = (cloudFavs || []).map(r => r.tea_id);
    const newFavs = localFavs.filter(id => !cloudFavIds.includes(id));
    if (newFavs.length) {
      await this.client.from('user_favorites').insert(
        newFavs.map(id => ({ user_id: this.user.id, tea_id: id }))
      );
    }

    // Inventário local
    const localInv = JSON.parse(localStorage.getItem('ervaria_inventory') || '[]');
    const { data: cloudInv } = await this.client.from('user_inventory')
      .select('tea_id').eq('user_id', this.user.id);
    const cloudInvIds = (cloudInv || []).map(r => r.tea_id);
    const newInv = localInv.filter(id => !cloudInvIds.includes(id));
    if (newInv.length) {
      await this.client.from('user_inventory').insert(
        newInv.map(id => ({ user_id: this.user.id, tea_id: id }))
      );
    }

    // Preferências locais
    const localPrefs = JSON.parse(localStorage.getItem('ervaria_preferences') || 'null');
    if (localPrefs) {
      await this.client.from('user_preferences').upsert({
        user_id: this.user.id,
        caffeine_pref: localPrefs.caffeine,
        moment_pref: localPrefs.moment,
        flavor_pref: localPrefs.flavor
      }, { onConflict: 'user_id' });
    }

    console.log('Ervaria: merged local data to cloud');
  },

  // ── UI DO AUTH ─────────────────────────────────────────────
  updateAuthUI(loggedIn) {
    const authBtn = document.getElementById('ervaria-auth-btn');
    const authModal = document.getElementById('ervaria-auth-modal');
    if (!authBtn) return;

    if (loggedIn) {
      const name = this.user?.user_metadata?.full_name || this.user?.email?.split('@')[0] || 'Usuário';
      const avatar = this.user?.user_metadata?.avatar_url;
      authBtn.innerHTML = avatar
        ? `<img src="${avatar}" style="width:28px;height:28px;border-radius:50%;object-fit:cover" alt="${name}"> <span style="max-width:100px;overflow:hidden;text-overflow:ellipsis">${name}</span>`
        : `<span style="width:28px;height:28px;border-radius:50%;background:#4a7c59;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600">${name[0].toUpperCase()}</span> <span>${name}</span>`;
      authBtn.onclick = () => this.showProfileMenu();
    } else {
      authBtn.innerHTML = '🔑 Entrar';
      authBtn.onclick = () => this.showAuthModal();
    }
  },

  showAuthModal() {
    let modal = document.getElementById('ervaria-auth-modal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'ervaria-auth-modal';
      modal.innerHTML = `
        <div class="ervaria-modal-overlay" onclick="ervaria.hideAuthModal()">
          <div class="ervaria-modal-content" onclick="event.stopPropagation()">
            <button class="ervaria-modal-close" onclick="ervaria.hideAuthModal()">&times;</button>
            <div class="ervaria-modal-header">
              <h2>🍵 Bem-vindo ao Ervaria</h2>
              <p>Entre para sincronizar seus chás favoritos em todos os dispositivos</p>
            </div>

            <div id="ervaria-auth-tabs" style="display:flex;gap:0;margin-bottom:20px;border-radius:8px;overflow:hidden;border:1px solid #ddd">
              <button class="ervaria-tab active" onclick="ervaria.switchTab('login')" id="tab-login" style="flex:1;padding:10px;border:none;cursor:pointer;font-weight:600;background:#4a7c59;color:#fff">Entrar</button>
              <button class="ervaria-tab" onclick="ervaria.switchTab('signup')" id="tab-signup" style="flex:1;padding:10px;border:none;cursor:pointer;font-weight:500;background:#f5f5f5;color:#333">Criar conta</button>
            </div>

            <div id="ervaria-form-login">
              <input type="email" id="ervaria-email" placeholder="Email" class="ervaria-input">
              <input type="password" id="ervaria-password" placeholder="Senha" class="ervaria-input">
              <button onclick="ervaria.handleLogin()" class="ervaria-btn-primary">Entrar</button>
              <button onclick="ervaria.handleForgotPassword()" class="ervaria-btn-link">Esqueci a senha</button>
            </div>

            <div id="ervaria-form-signup" style="display:none">
              <input type="text" id="ervaria-signup-name" placeholder="Seu nome" class="ervaria-input">
              <input type="email" id="ervaria-signup-email" placeholder="Email" class="ervaria-input">
              <input type="password" id="ervaria-signup-password" placeholder="Senha (mín. 6 caracteres)" class="ervaria-input">
              <button onclick="ervaria.handleSignup()" class="ervaria-btn-primary">Criar conta</button>
            </div>

            <div class="ervaria-divider"><span>ou continue com</span></div>

            <div style="display:flex;gap:10px">
              <button onclick="ervaria.loginGoogle()" class="ervaria-btn-social">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google
              </button>
              <button onclick="ervaria.loginApple()" class="ervaria-btn-social">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-1.89 4.46-3.74 4.25z"/></svg>
                Apple
              </button>
            </div>

            <div id="ervaria-auth-msg" style="margin-top:12px;text-align:center;font-size:13px;min-height:20px"></div>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    }
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
  },

  hideAuthModal() {
    const modal = document.getElementById('ervaria-auth-modal');
    if (modal) { modal.style.display = 'none'; document.body.style.overflow = ''; }
  },

  switchTab(tab) {
    document.getElementById('ervaria-form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('ervaria-form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('tab-login').style.background = tab === 'login' ? '#4a7c59' : '#f5f5f5';
    document.getElementById('tab-login').style.color = tab === 'login' ? '#fff' : '#333';
    document.getElementById('tab-signup').style.background = tab === 'signup' ? '#4a7c59' : '#f5f5f5';
    document.getElementById('tab-signup').style.color = tab === 'signup' ? '#fff' : '#333';
    document.getElementById('ervaria-auth-msg').textContent = '';
  },

  showMsg(text, isError = false) {
    const msg = document.getElementById('ervaria-auth-msg');
    if (msg) { msg.textContent = text; msg.style.color = isError ? '#c53030' : '#4a7c59'; }
  },

  async handleLogin() {
    const email = document.getElementById('ervaria-email').value.trim();
    const password = document.getElementById('ervaria-password').value;
    if (!email || !password) { this.showMsg('Preencha email e senha', true); return; }
    try {
      this.showMsg('Entrando...');
      await this.loginEmail(email, password);
      this.hideAuthModal();
      // Merge dados locais para a nuvem no primeiro login
      await this.mergeLocalToCloud();
    } catch (e) {
      this.showMsg(e.message === 'Invalid login credentials' ? 'Email ou senha incorretos' : e.message, true);
    }
  },

  async handleSignup() {
    const name = document.getElementById('ervaria-signup-name').value.trim();
    const email = document.getElementById('ervaria-signup-email').value.trim();
    const password = document.getElementById('ervaria-signup-password').value;
    if (!email || !password) { this.showMsg('Preencha email e senha', true); return; }
    if (password.length < 6) { this.showMsg('Senha deve ter pelo menos 6 caracteres', true); return; }
    try {
      this.showMsg('Criando conta...');
      await this.signupEmail(email, password, name);
      this.showMsg('Conta criada! Verifique seu email para confirmar.');
    } catch (e) {
      this.showMsg(e.message, true);
    }
  },

  async handleForgotPassword() {
    const email = document.getElementById('ervaria-email').value.trim();
    if (!email) { this.showMsg('Digite seu email acima primeiro', true); return; }
    try {
      await this.resetPassword(email);
      this.showMsg('Email de recuperação enviado!');
    } catch (e) {
      this.showMsg(e.message, true);
    }
  },

  showProfileMenu() {
    const name = this.user?.user_metadata?.full_name || this.user?.email?.split('@')[0] || 'Usuário';
    const email = this.user?.email || '';

    let menu = document.getElementById('ervaria-profile-menu');
    if (menu) { menu.remove(); return; }

    menu = document.createElement('div');
    menu.id = 'ervaria-profile-menu';
    menu.innerHTML = `
      <div style="padding:16px;border-bottom:1px solid #eee">
        <div style="font-weight:600;font-size:15px">${name}</div>
        <div style="font-size:12px;color:#888;margin-top:2px">${email}</div>
        <div style="font-size:11px;color:#4a7c59;margin-top:6px">✅ Sincronizado</div>
      </div>
      <button onclick="ervaria.syncFromCloud();document.getElementById('ervaria-profile-menu')?.remove()" style="width:100%;padding:12px 16px;border:none;background:none;text-align:left;cursor:pointer;font-size:14px;border-bottom:1px solid #f0f0f0">🔄 Sincronizar agora</button>
      <button onclick="ervaria.mergeLocalToCloud();document.getElementById('ervaria-profile-menu')?.remove()" style="width:100%;padding:12px 16px;border:none;background:none;text-align:left;cursor:pointer;font-size:14px;border-bottom:1px solid #f0f0f0">☁️ Enviar dados locais</button>
      <button onclick="ervaria.logout();document.getElementById('ervaria-profile-menu')?.remove()" style="width:100%;padding:12px 16px;border:none;background:none;text-align:left;cursor:pointer;font-size:14px;color:#c53030">🚪 Sair</button>
    `;
    menu.style.cssText = 'position:fixed;top:60px;right:16px;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:10001;min-width:220px;overflow:hidden';
    document.body.appendChild(menu);
    setTimeout(() => {
      document.addEventListener('click', function closeMenu(e) {
        if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', closeMenu); }
      });
    }, 100);
  }
};

// AUTO-INIT
document.addEventListener('DOMContentLoaded', () => ervaria.init());
</script>

<!-- CSS do Modal de Auth -->
<style>
.ervaria-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 10000;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  backdrop-filter: blur(4px);
}
.ervaria-modal-content {
  background: #fff; border-radius: 16px; padding: 32px; max-width: 400px; width: 100%;
  position: relative; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.ervaria-modal-close {
  position: absolute; top: 12px; right: 16px; background: none; border: none;
  font-size: 24px; cursor: pointer; color: #999; line-height: 1;
